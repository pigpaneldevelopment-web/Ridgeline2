<style>
:root {
  --bg-deep: #0A1726;
  --bg-night: #0F2032;
  --bg-card: #14283F;
  --bg-elev: #1B3450;
  --line: rgba(255,255,255,0.07);
  --line-strong: rgba(255,255,255,0.14);
  --text: #F4EFE6;
  --text-dim: #A9B6C7;
  --text-faint: #6B7B91;
  --orange: #E8804D;
  --ice: #8FC1DE;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow-x: hidden; }
body {
  font-family: 'Manrope', system-ui, sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  letter-spacing: 0.005em;
  background-image:
    radial-gradient(ellipse 800px 600px at 50% -10%, rgba(232,128,77,0.08), transparent 70%),
    radial-gradient(ellipse 600px 400px at 50% 110%, rgba(143,193,222,0.06), transparent 70%);
  background-attachment: fixed;
  padding-top: env(safe-area-inset-top);
  min-height: 100vh;
}

button { font-family: inherit; }

/* HEADER */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 22px 14px;
  position: sticky;
  top: 0;
  background: linear-gradient(180deg, var(--bg-deep) 75%, transparent);
  z-index: 50;
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
}
.brand { display: flex; align-items: center; gap: 11px; }
.brand-logo {
  width: 38px;
  height: 38px;
  border-radius: 9px;

        <button id="view-week" class="active" onclick="setView('week')">Week</button>
        <button id="view-month" onclick="setView('month')">Month</button>
      </div>
      <button class="range-btn" onclick="openRangeModal()">+ Trip</button>
    </div>
    <div class="cal-nav">
      <div class="cal-period" id="cal-period"></div>
      <div class="cal-arrow-group">
        <button class="cal-arrow" onclick="navCal(-1)" aria-label="Previous">‹</button>
        <button class="cal-arrow today-btn" onclick="navCal(0)">Today</button>
        <button class="cal-arrow" onclick="navCal(1)" aria-label="Next">›</button>
      </div>
    </div>
    <div id="cal-body"></div>
  </section>
</main>

<!-- TABBAR -->
<nav class="tabbar">
  <button id="tab-weather" class="active" onclick="setTab('weather')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 16 L8 6 L11 12 L14 4 L17 14 L21 8"/></svg>
    Forecast
  </button>
  <button id="tab-calendar" onclick="setTab('calendar')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
    Cabin
  </button>
</nav>

<!-- DAY MODAL -->
<div id="day-modal" class="modal-overlay" onclick="if(event.target===this)closeModal('day-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="day-modal-title"></div>
    <div class="modal-sub" id="day-modal-sub"></div>
    <div id="day-modal-body"></div>
  </div>
</div>

<!-- RANGE MODAL -->
<div id="range-modal" class="modal-overlay" onclick="if(event.target===this)closeModal('range-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">New Trip</div>
    <div class="modal-sub">Block out a stretch</div>
    <div class="range-row">
      <div>
        <div class="field-label">Start</div>
        <input type="date" id="range-start">
      </div>
      <div>
        <div class="field-label">End</div>
        <input type="date" id="range-end">
      </div>
    </div>
    <button class="btn-ghost" onclick="generateRange()">Build the Trip</button>
    <div id="range-day-list" class="range-day-list"></div>
    <button class="btn-primary" onclick="saveRange()">Save Trip</button>
  </div>
</div>

<!-- ADD USER MODAL -->
<div id="add-user-modal" class="modal-overlay" onclick="if(event.target===this)closeModal('add-user-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add a Person</div>
    <div class="modal-sub">New face for the share</div>
    <div>
      <div class="field-label">First Name</div>
      <input type="text" id="new-user-name" placeholder="e.g. Casey" autocomplete="off" maxlength="20">
    </div>
    <div style="margin-top:18px">
      <div class="field-label">Color</div>
      <div class="color-grid" id="color-grid"></div>
    </div>
    <button class="btn-primary" onclick="saveNewUser()">Add to the Share</button>
  </div>
</div>

<script>
// ==================== CONFIG ====================
const RESORTS = [
  { id: 'vail', name: 'Vail', lat: 39.6403, lon: -106.3742, elev: 8120 },
  { id: 'beaver', name: 'Beaver Creek', lat: 39.6042, lon: -106.5165, elev: 8100 },
  { id: 'breck', name: 'Breckenridge', lat: 39.4817, lon: -106.0384, elev: 9600 },
  { id: 'keystone', name: 'Keystone', lat: 39.5792, lon: -105.9342, elev: 9280 },
  { id: 'copper', name: 'Copper Mountain', lat: 39.5022, lon: -106.1497, elev: 9712 },
  { id: 'abasin', name: 'Arapahoe Basin', lat: 39.6425, lon: -105.8719, elev: 10780 },
  { id: 'loveland', name: 'Loveland', lat: 39.6803, lon: -105.8978, elev: 10800 },
  { id: 'winterpark', name: 'Winter Park', lat: 39.8868, lon: -105.7625, elev: 9000 },
  { id: 'steamboat', name: 'Steamboat', lat: 40.4572, lon: -106.8045, elev: 6900 },
];

const COLOR_PALETTE = [
  '#E8804D', '#8FC1DE', '#9DB89B', '#DDB766',
  '#D88AA0', '#A99BCD', '#6BA88B', '#C46A4A',
  '#A8C4E0', '#C5A77E', '#8DA68C', '#B68DAB',
  '#6FA8C2', '#D9A661', '#B0C28E', '#E89A82',
];

const SEED_USERS = [
  { id: 'sam', name: 'Sam', color: '#E8804D' },
  { id: 'jordan', name: 'Jordan', color: '#8FC1DE' },
];

const WX_CODES = {
  0:'Clear', 1:'Mostly clear', 2:'Partly cloudy', 3:'Overcast',
  45:'Foggy', 48:'Foggy',
  51:'Drizzle', 53:'Drizzle', 55:'Drizzle',
  61:'Rain', 63:'Rain', 65:'Heavy rain',
  66:'Freezing rain', 67:'Freezing rain',
  71:'Snow', 73:'Snow', 75:'Heavy snow', 77:'Snow grains',
  80:'Showers', 81:'Showers', 82:'Heavy showers',
  85:'Snow showers', 86:'Heavy snow',
  95:'Thunderstorm', 96:'Thunderstorm', 99:'Thunderstorm',
};

// ==================== STORE (swap for Firebase later) ====================
const Store = {
  _k: k => 'ridgeline_' + k,
  getUsers() {
    const raw = localStorage.getItem(this._k('users'));
    if (!raw) { localStorage.setItem(this._k('users'), JSON.stringify(SEED_USERS)); return [...SEED_USERS]; }
    return JSON.parse(raw);
  },
  saveUsers(u) { localStorage.setItem(this._k('users'), JSON.stringify(u)); },
  addUser(u) { const us = this.getUsers(); us.push(u); this.saveUsers(us); },
  getEntries() { const raw = localStorage.getItem(this._k('entries')); return raw ? JSON.parse(raw) : {}; },
  saveEntries(e) { localStorage.setItem(this._k('entries'), JSON.stringify(e)); },
  setStay(date, uid, val) {
    const e = this.getEntries();
    if (!e[date]) e[date] = { stays: {}, skis: {} };
    if (val) e[date].stays[uid] = true; else delete e[date].stays[uid];
    this._cleanup(e, date); this.saveEntries(e);
  },
  setSki(date, uid, mountainId) {
    const e = this.getEntries();
    if (!e[date]) e[date] = { stays: {}, skis: {} };
    if (mountainId) e[date].skis[uid] = mountainId; else delete e[date].skis[uid];
    this._cleanup(e, date); this.saveEntries(e);
  },
  _cleanup(e, d) {
    const day = e[d]; if (!day) return;
    if (Object.keys(day.stays || {}).length === 0 && Object.keys(day.skis || {}).length === 0) delete e[d];
  },
  getActiveUserId() { return localStorage.getItem(this._k('activeUser')); },
  setActiveUserId(id) { localStorage.setItem(this._k('activeUser'), id); },
};

// ==================== STATE ====================
let activeUserId = null;
let calView = 'week';
let calCursor = new Date();
let pendingColor = COLOR_PALETTE[0];
let rangeDays = [];
let weatherCache = null;

// ==================== UTIL ====================
const fmtKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const parseKey = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
const sameDay = (a, b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
const startOfWeek = d => { const r = new Date(d); r.setHours(0,0,0,0); r.setDate(r.getDate() - r.getDay()); return r; };
const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };
const getUser = id => Store.getUsers().find(u => u.id === id);
const getResort = id => RESORTS.find(r => r.id === id);
const initial = name => (name || '?')[0].toUpperCase();
function genUserId(name) {
  const base = name.toLowerCase().replace(/[^a-z0-9]/g, '') || 'user';
  const us = Store.getUsers();
  if (!us.find(u => u.id === base)) return base;
  let i = 2; while (us.find(u => u.id === base + i)) i++; return base + i;
}

// ==================== IDENTITY ====================
function renderIdentity() {
  const list = document.getElementById('identity-list');
  list.innerHTML = '';
  Store.getUsers().forEach(u => {
    const btn = document.createElement('button');
    btn.className = 'identity-btn';
    btn.innerHTML = `<span class="user-dot" style="background:${u.color}">${initial(u.name)}</span><span>${u.name}</span>`;
    btn.onclick = () => selectUser(u.id);
    list.appendChild(btn);
  });
  const add = document.createElement('button');
  add.className = 'identity-btn identity-add';
  add.textContent = '+ Add a person';
  add.onclick = openAddUserModal;
  list.appendChild(add);
}

function selectUser(id) {
  activeUserId = id;
  Store.setActiveUserId(id);
  document.getElementById('identity-overlay').style.display = 'none';
  renderUserPill();
  if (!weatherCache) loadWeather();
  renderCalendar();
}

function openIdentity() {
  document.getElementById('identity-overlay').style.display = 'flex';
  renderIdentity();
}

function renderUserPill() {
  const u = getUser(activeUserId); if (!u) return;
  const dot = document.getElementById('user-dot');
  dot.style.background = u.color;
  dot.textContent = initial(u.name);
  document.getElementById('user-name').textContent = u.name;
}

// ==================== ADD USER ====================
function openAddUserModal() {
  const taken = new Set(Store.getUsers().map(u => u.color));
  pendingColor = COLOR_PALETTE.find(c => !taken.has(c)) || COLOR_PALETTE[0];
  const grid = document.getElementById('color-grid');
  grid.innerHTML = '';
  COLOR_PALETTE.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch';
    sw.style.background = c;
    if (taken.has(c)) sw.classList.add('taken');
    if (c === pendingColor) sw.classList.add('selected');
    sw.onclick = () => {
      if (taken.has(c)) return;
      pendingColor = c;
      grid.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
    };
    grid.appendChild(sw);
  });
  document.getElementById('new-user-name').value = '';
  document.getElementById('add-user-modal').classList.add('active');
}

function saveNewUser() {
  const name = document.getElementById('new-user-name').value.trim();
  if (!name) { alert('Need a name'); return; }
  Store.addUser({ id: genUserId(name), name, color: pendingColor });
  closeModal('add-user-modal');
  renderIdentity();
}

// ==================== WEATHER ====================
async function loadWeather() {
  const list = document.getElementById('resort-list');
  list.innerHTML = RESORTS.map(r => `
    <div class="resort-card">
      <div class="resort-row1">
        <div>
          <div class="resort-name">${r.name}</div>
          <div class="resort-elev">Base · ${r.elev.toLocaleString()} ft</div>
        </div>
        <div class="temp-block"><span class="skel" style="width:64px;height:32px"></span></div>
      </div>
      <div class="resort-row2">
        ${[0,1,2,3].map(()=>`<div class="fc-cell"><div class="fc-day">·</div><span class="skel" style="width:32px"></span></div>`).join('')}
      </div>
    </div>`).join('');

  const results = await Promise.all(RESORTS.map(async r => {
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${r.lat}&longitude=${r.lon}&current=temperature_2m,weather_code&daily=snowfall_sum,weather_code&temperature_unit=fahrenheit&precipitation_unit=inch&timezone=America%2FDenver&forecast_days=4`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('http');
      return { resort: r, data: await res.json() };
    } catch (e) { return { resort: r, error: true }; }
  }));

  weatherCache = results;
  list.innerHTML = '';
  results.forEach(({ resort, data, error }) => {
    if (error) {
      list.insertAdjacentHTML('beforeend', `
        <div class="resort-card">
          <div class="resort-row1">
            <div>
              <div class="resort-name">${resort.name}</div>
              <div class="resort-elev">Base · ${resort.elev.toLocaleString()} ft</div>
            </div>
            <div class="temp-block"><div class="cond" style="opacity:0.6">unavailable</div></div>
          </div>
        </div>`);
      return;
    }
    const temp = Math.round(data.current.temperature_2m);
    const cond = WX_CODES[data.current.weather_code] || '—';
    const days = data.daily.time.map((t, i) => ({
      date: parseKey(t),
      snow: data.daily.snowfall_sum[i] || 0,
    })).slice(0, 4);
    const dayLabel = (d, i) => i === 0 ? 'TODAY' : d.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
    list.insertAdjacentHTML('beforeend', `
      <div class="resort-card">
        <div class="resort-row1">
          <div>
            <div class="resort-name">${resort.name}</div>
            <div class="resort-elev">Base · ${resort.elev.toLocaleString()} ft</div>
          </div>
          <div class="temp-block">
            <div class="temp">${temp}<span class="temp-deg">°F</span></div>
            <div class="cond">${cond}</div>
          </div>
        </div>
        <div class="resort-row2">
          ${days.map((d, i) => `
            <div class="fc-cell">
              <div class="fc-day">${dayLabel(d.date, i)}</div>
              <div class="fc-snow ${d.snow < 0.1 ? 'zero' : ''}">${d.snow.toFixed(1)}<span class="fc-snow-unit">in</span></div>
            </div>`).join('')}
        </div>
      </div>`);
  });
}

// ==================== TABS / VIEW ====================
function setTab(tab) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById(tab + '-tab').classList.add('active');
  document.querySelectorAll('nav.tabbar button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}
function setView(v) {
  calView = v;
  document.getElementById('view-week').classList.toggle('active', v === 'week');
  document.getElementById('view-month').classList.toggle('active', v === 'month');
  renderCalendar();
}
function navCal(dir) {
  if (dir === 0) calCursor = new Date();
  else if (calView === 'week') calCursor = addDays(calCursor, dir * 7);
  else calCursor = new Date(calCursor.getFullYear(), calCursor.getMonth() + dir, 1);
  renderCalendar();
}

// ==================== CALENDAR RENDER ====================
function renderCalendar() {
  if (calView === 'week') renderWeek(); else renderMonth();
}

function renderWeek() {
  const start = startOfWeek(calCursor);
  const end = addDays(start, 6);
  const fmtMon = d => d.toLocaleDateString('en-US', { month: 'short' });
  let label = start.getMonth() === end.getMonth()
    ? `${fmtMon(start)} ${start.getDate()}<em>– ${end.getDate()}, ${end.getFullYear()}</em>`
    : `${fmtMon(start)} ${start.getDate()}<em>– ${fmtMon(end)} ${end.getDate()}</em>`;
  document.getElementById('cal-period').innerHTML = label;

  const today = new Date();
  const entries = Store.getEntries();
  const users = Store.getUsers();
  const userMap = Object.fromEntries(users.map(u => [u.id, u]));

  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = addDays(start, i);
    const key = fmtKey(d);
    const entry = entries[key];
    const isToday = sameDay(d, today);
    const isWknd = d.getDay() === 0 || d.getDay() === 6;
    let lines = '';
    if (entry) {
      const ids = new Set([...Object.keys(entry.stays || {}), ...Object.keys(entry.skis || {})]);
      const ordered = [...ids].sort((a, b) => users.findIndex(u => u.id === a) - users.findIndex(u => u.id === b));
      lines = ordered.map(uid => {
        const u = userMap[uid]; if (!u) return '';
        const s = entry.stays && entry.stays[uid];
        const sk = entry.skis && entry.skis[uid] ? getResort(entry.skis[uid]) : null;
        const parts = [];
        if (s) parts.push('staying');
        if (sk) parts.push('ski · ' + sk.name);
        return `<div class="entry-line"><span class="entry-dot" style="background:${u.color}"></span><span class="entry-name">${u.name}</span><span class="entry-detail">${parts.join(' + ')}</span></div>`;
      }).join('');
    }
    if (!lines) lines = '<div class="day-empty">— open —</div>';
    days.push(`
      <div class="week-day ${isToday ? 'today' : ''} ${isWknd ? 'weekend' : ''}" onclick="openDayModal('${key}')">
        <div class="day-stamp">
          <div class="day-name">${d.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase()}</div>
          <div class="day-num">${d.getDate()}</div>
        </div>
        <div class="day-content">${lines}</div>
      </div>`);
  }
  document.getElementById('cal-body').innerHTML = `<div class="week-grid">${days.join('')}</div>`;
}

function renderMonth() {
  const cursor = new Date(calCursor.getFullYear(), calCursor.getMonth(), 1);
  const month = cursor.toLocaleDateString('en-US', { month: 'long' });
  const year = cursor.getFullYear();
  document.getElementById('cal-period').innerHTML = `${month}<em>${year}</em>`;

  const today = new Date();
  const entries = Store.getEntries();
  const users = Store.getUsers();
  const userMap = Object.fromEntries(users.map(u => [u.id, u]));
  const gridStart = startOfWeek(cursor);

  let cells = '';
  for (let i = 0; i < 42; i++) {
    const d = addDays(gridStart, i);
    const key = fmtKey(d);
    const inMonth = d.getMonth() === cursor.getMonth();
    const isToday = sameDay(d, today);
    const entry = entries[key];
    let dots = '';
    if (entry) {
      const ids = new Set([...Object.keys(entry.stays || {}), ...Object.keys(entry.skis || {})]);
      [...ids].sort((a, b) => users.findIndex(u => u.id === a) - users.findIndex(u => u.id === b)).forEach(uid => {
        const u = userMap[uid]; if (!u) return;
        dots += `<div class="mc-dot" style="background:${u.color}"></div>`;
      });
    }
    cells += `<div class="month-cell ${inMonth ? '' : 'other-month'} ${isToday ? 'today' : ''}" onclick="openDayModal('${key}')"><div class="mc-day">${d.getDate()}</div><div class="mc-dots">${dots}</div></div>`;
    if (i >= 27 && d.getMonth() !== cursor.getMonth() && d.getDay() === 6) break;
  }
  document.getElementById('cal-body').innerHTML = `
    <div class="month-wrap">
      <div class="month-weekdays"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>
      <div class="month-grid">${cells}</div>
    </div>`;
}

// ==================== DAY MODAL ====================
function openDayModal(dateKey) {
  const d = parseKey(dateKey);
  const entry = Store.getEntries()[dateKey] || { stays: {}, skis: {} };
  const users = Store.getUsers();
  const userMap = Object.fromEntries(users.map(u => [u.id, u]));
  const me = userMap[activeUserId];
  if (!me) return;

  const staying = !!(entry.stays && entry.stays[activeUserId]);
  const skiId = (entry.skis && entry.skis[activeUserId]) || '';

  document.getElementById('day-modal-title').textContent = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  document.getElementById('day-modal-sub').textContent = `Editing as ${me.name}`;

  const otherIds = [...new Set([...Object.keys(entry.stays || {}), ...Object.keys(entry.skis || {})])].filter(uid => uid !== activeUserId);
  let othersHtml = '';
  if (otherIds.length) {
    othersHtml = `
      <div style="margin-top:22px;padding-top:16px;border-top:1px solid var(--line)">
        <div class="modal-sub" style="margin-bottom:8px">Also on this day</div>
        <div class="others-list">
          ${otherIds.map(uid => {
            const u = userMap[uid]; if (!u) return '';
            const s = entry.stays && entry.stays[uid];
            const k = entry.skis && entry.skis[uid] ? getResort(entry.skis[uid]) : null;
            const tags = [];
            if (s) tags.push('staying');
            if (k) tags.push('skiing ' + k.name);
            return `<div class="entry-line"><span class="entry-dot" style="background:${u.color}"></span><span class="entry-name">${u.name}</span><span class="entry-detail">${tags.join(' + ')}</span></div>`;
          }).join('')}
        </div>
      </div>`;
  }

  document.getElementById('day-modal-body').innerHTML = `
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Staying the night</div>
        <div class="toggle-sub">Sleeping at the share</div>
      </div>
      <div class="switch ${staying ? 'on' : ''}" id="stay-switch" onclick="toggleStay('${dateKey}')"></div>
    </div>
    <div style="padding:16px 0;border-bottom:1px solid var(--line)">
      <div class="toggle-label">Skiing</div>
      <div class="toggle-sub">Pick a mountain</div>
      <select id="ski-select" onchange="updateSki('${dateKey}', this.value)">
        <option value="">— not skiing —</option>
        ${RESORTS.map(r => `<option value="${r.id}" ${skiId === r.id ? 'selected' : ''}>${r.name}</option>`).join('')}
      </select>
    </div>
    ${othersHtml}
    <button class="btn-primary" onclick="closeModal('day-modal')">Done</button>`;
  document.getElementById('day-modal').classList.add('active');
}

function toggleStay(dateKey) {
  const sw = document.getElementById('stay-switch');
  const newVal = !sw.classList.contains('on');
  sw.classList.toggle('on', newVal);
  Store.setStay(dateKey, activeUserId, newVal);
  renderCalendar();
}
function updateSki(dateKey, mountainId) {
  Store.setSki(dateKey, activeUserId, mountainId || null);
  renderCalendar();
}

// ==================== RANGE MODAL ====================
function openRangeModal() {
  const today = new Date();
  document.getElementById('range-start').value = fmtKey(today);
  document.getElementById('range-end').value = fmtKey(addDays(today, 2));
  document.getElementById('range-day-list').innerHTML = '';
  rangeDays = [];
  document.getElementById('range-modal').classList.add('active');
}

function generateRange() {
  const s = document.getElementById('range-start').value;
  const e = document.getElementById('range-end').value;
  if (!s || !e) { alert('Pick both dates'); return; }
  const start = parseKey(s), end = parseKey(e);
  if (end < start) { alert('End must be on or after start'); return; }
  rangeDays = [];
  let d = new Date(start);
  while (d <= end) {
    const key = fmtKey(d);
    const entry = Store.getEntries()[key] || { stays: {}, skis: {} };
    rangeDays.push({
      key,
      date: new Date(d),
      staying: !!(entry.stays && entry.stays[activeUserId]),
      skiId: (entry.skis && entry.skis[activeUserId]) || '',
    });
    d = addDays(d, 1);
  }
  document.getElementById('range-day-list').innerHTML = rangeDays.map((rd, i) => `
    <div class="range-day-item">
      <div class="range-day-head">
        <div class="range-day-date">${rd.date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</div>
        <label class="mini-toggle">
          <input type="checkbox" ${rd.staying ? 'checked' : ''} onchange="rangeDays[${i}].staying = this.checked">
          STAYING
        </label>
      </div>
      <select onchange="rangeDays[${i}].skiId = this.value">
        <option value="">— not skiing —</option>
        ${RESORTS.map(r => `<option value="${r.id}" ${rd.skiId === r.id ? 'selected' : ''}>${r.name}</option>`).join('')}
      </select>
    </div>`).join('');
}

function saveRange() {
  if (!rangeDays.length) { alert('Build the trip first'); return; }
  rangeDays.forEach(rd => {
    Store.setStay(rd.key, activeUserId, rd.staying);
    Store.setSki(rd.key, activeUserId, rd.skiId || null);
  });
  closeModal('range-modal');
  rangeDays = [];
  renderCalendar();
}

// ==================== HELPERS ====================
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// ==================== INIT ====================
function init() {
  const stored = Store.getActiveUserId();
  const users = Store.getUsers();
  if (stored && users.find(u => u.id === stored)) {
    activeUserId = stored;
    document.getElementById('identity-overlay').style.display = 'none';
    renderUserPill();
    loadWeather();
    renderCalendar();
  } else {
    renderIdentity();
  }
}
init();
</script>
</body>
</html>
